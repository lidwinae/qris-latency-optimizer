services:
  # Database PostgreSQL untuk penyimpanan permanen transaksi
  db:
    image: postgres:15-alpine
    container_name: qris_postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis untuk Caching Layer (Kunci optimasi latency p95)
  redis:
    image: redis:7-alpine
    container_name: qris_redis
    ports:
      - "6379:6379"

  redisinsight:
    image: redis/redisinsight:latest
    container_name: qris_redisinsight
    ports:
      - "5540:5540"
    depends_on:
      - redis
    volumes:
      - redisinsight_data:/data

  # RabbitMQ untuk Message Broker (Proses Asynchronous)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: qris_rabbitmq
    ports:
      - "5672:5672" # Port data
      - "15672:15672" # Port Dashboard (bisa dibuka di browser)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - db

  # --- MONITORING STACK ---

  # InfluxDB untuk menyimpan metrik hasil Load Test k6
  influxdb:
    image: influxdb:1.8-alpine
    container_name: qris_influxdb
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB: ${INFLUXDB_DB}
    volumes:
      - influxdb_data:/var/lib/influxdb

  # Grafana untuk visualisasi grafik real-time
  grafana:
    image: grafana/grafana-oss
    container_name: qris_grafana
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: ${GF_AUTH_ANONYMOUS_ENABLED}
      GF_AUTH_ANONYMOUS_ORG_ROLE: ${GF_AUTH_ANONYMOUS_ORG_ROLE}
    depends_on:
      - influxdb
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  postgres_data:
  redisinsight_data:
  influxdb_data:
  grafana_data:
